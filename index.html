<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prod-Pusher Control Panel</title>
<link rel="icon" href="/assets/icon.ico" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-bar">
  <span class="app-bar__title">PROD-PUSHER</span>
  <span class="app-bar__version" id="app-bar-version"></span>
</div>
<div class="container">
  <h1>🚀 Prod-Pusher Control Panel</h1>
  <p>Select the environment to upload your files.</p>
  <div class="upload-buttons">
    <button onclick="window.location.href='internal/index.html'"> 🛠️ Internal Server Upload </button>
    <button onclick="window.location.href='external/index.html'"> 🌐 External Server Upload </button>
    <button onclick="window.location.href='history/index.html'" style="background-color:#334155"> 📋 Publish History </button>
       </div>
       <section class="home-section small" aria-labelledby="features-heading">
    <h2 id="features-heading">Upcoming Features</h2>
    <div class="body">
      <ul class="home-features">
        <li>Option to delete live files?</li>
        <li>Scheduled / batch publishing</li>
      </ul>
    </div>
  </section>

  <section class="home-section home-contact" aria-labelledby="contact-heading">
    <h2 id="contact-heading">Questions or bugs?</h2>
    <div class="body">
      <p>Reach out on Slack or open an issue on GitHub.</p>
    </div>
  </section>

 
 <div data-include="/includes/footer.html"></div>






</div>
 <script>
document.addEventListener('DOMContentLoaded', () => {

  const cs = getComputedStyle(document.body);
  if (cs.position === 'fixed') {
    const t = parseInt(document.body.style.top || '0', 10) || 0;
    document.body.style.position = '';
    document.body.style.top = '';
    if (t) window.scrollTo({ top: -t });
  }
});
</script>
   

<script>
(async () => {
  try {
    const h = await fetch('/api/health');
    const hd = await h.json();
    const vEl = document.getElementById('app-bar-version');
    if (vEl && hd.version) vEl.textContent = 'v' + hd.version;
  } catch {}
  try {
    const r = await fetch('/api/update-check');
    const d = await r.json();
    if (!d.updateAvailable) return;
    const banner = document.createElement('div');
    banner.id = 'update-banner';
    banner.innerHTML =
      `⬆️ Update available: v${d.latestVersion} &nbsp;` +
      `<a href="${d.releaseUrl}" target="_blank">Download</a>` +
      `<button onclick="document.getElementById('update-banner').remove()" aria-label="Dismiss">✕</button>`;
    document.querySelector('.container').prepend(banner);
  } catch {}
})();
</script>
<script src="/assets/includes.js"></script>
<script src="/assets/toast.js"></script>
<script src="/assets/theme-toggle.js"></script>
</body>
</html>
